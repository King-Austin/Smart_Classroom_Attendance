name: OTA Update (CapGo)

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Upload to CapGo
        run: npx @capgo/cli@latest upload --apikey ${{ secrets.CAPGO_TOKEN }} --app-id ${{ secrets.CAPGO_APP_ID }} --bundle dist
